services:
  backend:
    build: ./backend
    network_mode: host        # Drucker-Verbindungen kommen von der NAS-IP
    volumes:
      - ./data:/app/data      # Ganzes data/-Verzeichnis — config.json wird automatisch angelegt
    environment:
      - CONFIG_FILE=/app/data/config.json
      - UPLOADS_DIR=/app/data/uploads
      - GCODES_DIR=/app/data/gcodes
      - PROFILES_DIR=/app/data/profiles
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    extra_hosts:
      - "host.nas:host-gateway"
    depends_on:
      - backend
