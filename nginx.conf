server {
    listen 80;

    # API: proxy zum Backend das direkt auf der NAS läuft (host-Netzwerk, Port 8000)
    location /api/ {
        proxy_pass http://host.nas:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 500M;
        proxy_read_timeout 300s;  # Slicing kann dauern
    }

    # Frontend SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
